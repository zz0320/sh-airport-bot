services:
  sh-airport-bot:
    build: .
    container_name: sh-airport-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      SUBSCRIPTION_STORE: /app/data/subscriptions.json
      FLIGHT_MEMORY_STORE: /app/data/flight_memory.json
    volumes:
      - ./data:/app/data
